<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Arjun's Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #6B6965;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #080809; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: 0 max(18px, env(safe-area-inset-right)) 88px max(18px, env(safe-area-inset-left));
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}

.page { max-width: 900px; margin: 0 auto; padding-top: 20px; }

.dash-title {
  margin: 0 0 18px; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C0BDB6 130%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* ── Bento grid ───────────────────────────────────────── */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 172px;
  gap: 12px;
  grid-auto-flow: dense;
}

.tile {
  --accent: #6BE3A4;
  display: flex; flex-direction: column;
  padding: 16px 18px 15px;
  /* dark glass base + per-tile accent bloom in top-right */
  background-color: rgba(12, 12, 14, 0.90);
  background-image: radial-gradient(ellipse at 94% 6%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 54%);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 20px; text-decoration: none;
  backdrop-filter: blur(28px) saturate(1.3);
  -webkit-backdrop-filter: blur(28px) saturate(1.3);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
  overflow: hidden; position: relative;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 38%, transparent);
  box-shadow: 0 12px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.05);
}
.tile:active { transform: translateY(-1px); }
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* bigger bloom for the large tile */
.tile.big {
  background-image: radial-gradient(ellipse at 88% 8%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 52%);
}

.tile-top { display: flex; justify-content: space-between; align-items: flex-start; }

.tile-num {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: rgba(255, 255, 255, 0.22); letter-spacing: 0.06em;
}
.tile-icon {
  font-size: 26px; line-height: 1;
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 80%, transparent));
}
.tile.big .tile-icon { font-size: 34px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 17px; font-weight: 700; color: var(--text-primary);
  letter-spacing: -0.015em; margin-bottom: 4px;
}
.tile.big .tile-title { font-size: 23px; }

.tile-footer { display: flex; justify-content: space-between; align-items: center; }
.tile-sub {
  font-size: 11px; color: var(--text-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 82%;
}
.tile-arrow {
  font-size: 15px; color: color-mix(in srgb, var(--accent) 80%, transparent); flex-shrink: 0;
  transition: transform 0.2s ease;
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* dead tile (no page yet) */
a.tile-dead { cursor: default; }
a.tile-dead:hover { transform: none; border-color: rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.55); }
a.tile-dead:hover .tile-arrow { transform: none; }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
  .tile.big .tile-icon { font-size: 28px; }
  .tile.big .tile-title { font-size: 19px; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; grid-auto-rows: 130px; }
  .tile.big, .tile.wide { grid-column: span 1; }
  .dash-title { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <!-- · 01 Main -->
    <a href="main.html" class="tile big" style="--accent: #5EE8A4">
      <div class="tile-top">
        <span class="tile-num">· 01</span>
        <span class="tile-icon">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 02 Fitness -->
    <a href="gym.html" class="tile wide" style="--accent: #FBBF24">
      <div class="tile-top">
        <span class="tile-num">· 02</span>
        <span class="tile-icon">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 03 Health -->
    <a href="health.html" class="tile" style="--accent: #F87171">
      <div class="tile-top">
        <span class="tile-num">· 03</span>
        <span class="tile-icon">♥️</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 04 Water -->
    <a href="po-water.html" class="tile" style="--accent: #60A5FA">
      <div class="tile-top">
        <span class="tile-num">· 04</span>
        <span class="tile-icon">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 05 Finance -->
    <a href="finance.html" class="tile wide" style="--accent: #F59E0B">
      <div class="tile-top">
        <span class="tile-num">· 05</span>
        <span class="tile-icon">📊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 06 Caffeine -->
    <a href="#" class="tile tile-dead" style="--accent: #FB923C" onclick="return false">
      <div class="tile-top">
        <span class="tile-num">· 06</span>
        <span class="tile-icon">☕</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Caffeine</div>
      <div class="tile-footer">
        <span class="tile-sub">Intake &amp; timing</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
