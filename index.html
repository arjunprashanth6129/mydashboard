<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Arjun's Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: 0 max(20px, env(safe-area-inset-right)) 80px max(20px, env(safe-area-inset-left));
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 80% 12%, rgba(107, 227, 164, 0.13), transparent 45%),
    radial-gradient(circle at 20% 88%, rgba(125, 211, 252, 0.09), transparent 50%);
  filter: blur(48px); pointer-events: none; z-index: -2;
  animation: drift 38s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-20px, 12px, 0); }
}

.page { max-width: 900px; margin: 0 auto; padding-top: 22px; }

.dash-title {
  margin: 0 0 20px; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 130%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* ── Bento grid ───────────────────────────────────────── */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

.tile {
  --accent: #6BE3A4;
  display: flex; flex-direction: column;
  padding: 18px 20px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 18px; text-decoration: none;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.40);
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden; position: relative;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 45%, transparent);
  box-shadow: 0 14px 44px rgba(0, 0, 0, 0.55);
}
.tile:active { transform: translateY(-1px); }
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-top { display: flex; justify-content: space-between; align-items: flex-start; }

.tile-num {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: rgba(255, 255, 255, 0.28); letter-spacing: 0.08em;
}
.tile-icon { font-size: 26px; line-height: 1; filter: drop-shadow(0 0 8px var(--accent)); }
.tile.big .tile-icon { font-size: 36px; }

.tile-icon-dollar {
  font-size: 26px; font-weight: 800; font-family: var(--font);
  color: var(--accent); line-height: 1;
  text-shadow: 0 0 12px var(--accent);
}

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 18px; font-weight: 700; color: var(--text-primary);
  letter-spacing: -0.01em; margin-bottom: 5px;
}
.tile.big .tile-title { font-size: 24px; }

.tile-footer { display: flex; justify-content: space-between; align-items: center; }
.tile-sub {
  font-size: 11.5px; color: var(--text-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%;
}
.tile-arrow {
  font-size: 16px; color: var(--accent); flex-shrink: 0;
  transition: transform 0.2s ease;
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; grid-auto-rows: 140px; }
  .tile.big, .tile.wide { grid-column: span 1; }
  .dash-title { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <!-- ·01 Main -->
    <a href="main.html" class="tile big" style="--accent: #6BE3A4">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-icon">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness -->
    <a href="gym.html" class="tile wide" style="--accent: #7DD3FC">
      <div class="tile-top">
        <span class="tile-num">·02</span>
        <span class="tile-icon">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health -->
    <a href="health.html" class="tile" style="--accent: #A7F3D0">
      <div class="tile-top">
        <span class="tile-num">·03</span>
        <span class="tile-icon">♥️</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Water -->
    <a href="po-water.html" class="tile" style="--accent: #60A5FA">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-icon">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Finance -->
    <a href="finance.html" class="tile wide" style="--accent: #F2C063">
      <div class="tile-top">
        <span class="tile-num">·05</span>
        <span class="tile-icon-dollar">$</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
