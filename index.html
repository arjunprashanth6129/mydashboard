<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Arjun's Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #6B6965;
  --success:        #6BE3A4;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #080809; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: 0 max(18px, env(safe-area-inset-right)) 88px max(18px, env(safe-area-inset-left));
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}

.page { max-width: 900px; margin: 0 auto; padding-top: 20px; }

/* ── Page header ──────────────────────────────────── */
.page-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px;
}
.dash-title {
  margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C0BDB6 130%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.gear-btn {
  width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.09);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.50);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.gear-btn:hover { background: rgba(255,255,255,0.09); color: #FAFAFA; }
.gear-icon { transition: transform 0.18s ease; display: flex; }
.gear-btn:active .gear-icon { transform: rotate(35deg); }

/* ── Bento grid ───────────────────────────────────────── */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 172px;
  gap: 12px;
  grid-auto-flow: dense;
}
.tile {
  --accent: #6BE3A4;
  display: flex; flex-direction: column;
  padding: 16px 18px 15px;
  background-color: rgba(12, 12, 14, 0.90);
  background-image: radial-gradient(ellipse at 94% 6%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 54%);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 20px; text-decoration: none;
  backdrop-filter: blur(28px) saturate(1.3);
  -webkit-backdrop-filter: blur(28px) saturate(1.3);
  box-shadow: 0 4px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
  overflow: hidden; position: relative;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 38%, transparent);
  box-shadow: 0 12px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.05);
}
.tile:active { transform: translateY(-1px); }
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }
.tile.big  { background-image: radial-gradient(ellipse at 88% 8%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 52%); }
.tile-top  { display: flex; justify-content: space-between; align-items: flex-start; }
.tile-num  { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.22); letter-spacing: 0.06em; }
.tile-icon { font-size: 26px; line-height: 1; filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 80%, transparent)); }
.tile.big .tile-icon { font-size: 34px; }
.tile-spacer { flex: 1; }
.tile-title { font-size: 17px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.015em; margin-bottom: 4px; }
.tile.big .tile-title { font-size: 23px; }
.tile-footer { display: flex; justify-content: space-between; align-items: center; }
.tile-sub   { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 82%; }
.tile-arrow { font-size: 15px; color: color-mix(in srgb, var(--accent) 80%, transparent); flex-shrink: 0; transition: transform 0.2s ease; }
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ── Settings modal ───────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,0.68);
  backdrop-filter: blur(14px) saturate(1.1);
  -webkit-backdrop-filter: blur(14px) saturate(1.1);
  opacity: 0; pointer-events: none;
  transition: opacity 0.22s ease;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
  position: relative; width: min(460px, 100%);
  max-height: 86vh; overflow-y: auto; overscroll-behavior: contain;
  background: rgba(13,13,15,0.98);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px; padding: 24px 22px 28px;
  box-shadow: 0 24px 72px rgba(0,0,0,0.80);
}

/* modal header */
.m-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.m-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.m-close {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  border: none; background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.55); font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
}
.m-close:hover { background: rgba(255,255,255,0.10); color: #FAFAFA; }

/* settings field rows */
.s-field {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 0; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.s-field:last-of-type { border-bottom: none; }
.s-label { font-size: 13.5px; font-weight: 500; color: var(--text-primary); flex-shrink: 0; min-width: 110px; }
.s-ctrl  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

/* number inputs */
.s-input {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px; padding: 8px 10px;
  color: var(--text-primary); font-size: 14px; font-weight: 500; font-family: var(--font-mono);
  width: 78px; text-align: center; -moz-appearance: textfield;
}
.s-input::-webkit-outer-spin-button, .s-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.s-input:focus { outline: none; border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.08); }
.s-input-sm { width: 56px; }
.s-unit { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }

/* segmented control */
.seg {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.06); border-radius: 9px; padding: 2px;
}
.seg-opt {
  padding: 5px 11px; border-radius: 7px; border: none;
  background: transparent; color: rgba(255,255,255,0.42);
  font-size: 12px; font-weight: 600; font-family: var(--font);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
}
.seg-opt.active { background: rgba(255,255,255,0.13); color: #FAFAFA; }

.s-hidden { display: none !important; }

/* save button */
.save-btn {
  width: 100%; margin-top: 18px; padding: 13px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: var(--text-primary);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.save-btn:hover { background: rgba(255,255,255,0.12); }
.save-btn.saved { background: rgba(107,227,164,0.15); border-color: rgba(107,227,164,0.30); color: #6BE3A4; }

/* divider */
.s-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 22px 0 20px; }

/* WHOOP card */
.whoop-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; padding: 16px;
}
.whoop-header { margin-bottom: 12px; }
.whoop-name-row { display: flex; align-items: center; gap: 8px; }
.whoop-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.whoop-dot.green { background: #6BE3A4; box-shadow: 0 0 6px rgba(107,227,164,0.6); }
.whoop-dot.grey  { background: rgba(255,255,255,0.22); }
.whoop-name   { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.whoop-status-txt { font-size: 12px; color: var(--text-tertiary); margin-left: auto; }
.whoop-status-txt.green { color: #6BE3A4; }
.whoop-sync-time  { font-size: 11.5px; color: var(--text-tertiary); margin-top: 5px; padding-left: 16px; }
.whoop-stats {
  display: flex; gap: 8px; margin: 14px 0 14px;
}
.whoop-stat {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 6px;
}
.whoop-stat-val   { font-size: 17px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }
.whoop-stat-label { font-size: 10.5px; color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.whoop-sync-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  color: var(--text-primary); font-size: 13px; font-weight: 600; font-family: var(--font);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.whoop-sync-btn:hover { background: rgba(255,255,255,0.10); }
.whoop-sync-btn:disabled { opacity: 0.5; cursor: default; }
.whoop-connect-link {
  display: block; width: 100%; padding: 10px; border-radius: 10px; text-align: center;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  color: var(--text-secondary); font-size: 13px; font-weight: 600;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.whoop-connect-link:hover { background: rgba(255,255,255,0.10); }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
  .tile.big .tile-icon { font-size: 28px; }
  .tile.big .tile-title { font-size: 19px; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; grid-auto-rows: 130px; }
  .tile.big, .tile.wide { grid-column: span 1; }
  .dash-title { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <h1 class="dash-title">Dashboard</h1>
    <button class="gear-btn" id="settingsGear" type="button" aria-label="Settings">
      <span class="gear-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
    </button>
  </div>

  <div class="bento-grid">

    <!-- · 01 Main -->
    <a href="main.html" class="tile big" style="--accent: #5EE8A4">
      <div class="tile-top">
        <span class="tile-num">· 01</span>
        <span class="tile-icon">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 02 Fitness -->
    <a href="gym.html" class="tile wide" style="--accent: #FBBF24">
      <div class="tile-top">
        <span class="tile-num">· 02</span>
        <span class="tile-icon">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 03 Health -->
    <a href="health.html" class="tile" style="--accent: #F87171">
      <div class="tile-top">
        <span class="tile-num">· 03</span>
        <span class="tile-icon">♥️</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 04 Water -->
    <a href="po-water.html" class="tile" style="--accent: #60A5FA">
      <div class="tile-top">
        <span class="tile-num">· 04</span>
        <span class="tile-icon">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- · 05 Finance -->
    <a href="finance.html" class="tile wide" style="--accent: #F59E0B">
      <div class="tile-top">
        <span class="tile-num">· 05</span>
        <span class="tile-icon">📊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>

<!-- ── Settings modal ─────────────────────────────────── -->
<div class="modal-bg" id="settingsBg" role="dialog" aria-modal="true" aria-label="Your Data">
  <div class="modal" id="settingsModal">

    <div class="m-header">
      <span class="m-title">Your Data</span>
      <button class="m-close" id="settingsClose" type="button" aria-label="Close">×</button>
    </div>

    <!-- Height -->
    <div class="s-field">
      <span class="s-label">Height</span>
      <div class="s-ctrl">
        <div id="heightCmWrap" style="display:flex;align-items:center;gap:6px;">
          <input class="s-input" type="number" id="heightCm" min="50" max="280" placeholder="175">
        </div>
        <div id="heightFtInWrap" class="s-hidden" style="display:flex;align-items:center;gap:5px;">
          <input class="s-input s-input-sm" type="number" id="heightFt" min="1" max="8" placeholder="5">
          <span class="s-unit">ft</span>
          <input class="s-input s-input-sm" type="number" id="heightIn" min="0" max="11" placeholder="10">
          <span class="s-unit">in</span>
        </div>
        <div class="seg" id="heightUnitSeg">
          <button type="button" class="seg-opt active" data-val="cm">cm</button>
          <button type="button" class="seg-opt" data-val="ftin">ft/in</button>
        </div>
      </div>
    </div>

    <!-- Weight -->
    <div class="s-field">
      <span class="s-label">Weight</span>
      <div class="s-ctrl">
        <input class="s-input" type="number" id="weightVal" min="20" max="400" placeholder="75">
        <div class="seg" id="weightUnitSeg">
          <button type="button" class="seg-opt active" data-val="kg">kg</button>
          <button type="button" class="seg-opt" data-val="lb">lb</button>
        </div>
      </div>
    </div>

    <!-- Age -->
    <div class="s-field">
      <span class="s-label">Age</span>
      <div class="s-ctrl">
        <input class="s-input" type="number" id="ageVal" min="10" max="120" placeholder="25">
        <span class="s-unit" style="min-width:30px">yrs</span>
      </div>
    </div>

    <!-- Sex -->
    <div class="s-field">
      <span class="s-label">Sex</span>
      <div class="s-ctrl">
        <div class="seg" id="sexSeg">
          <button type="button" class="seg-opt active" data-val="m">Male</button>
          <button type="button" class="seg-opt" data-val="f">Female</button>
        </div>
      </div>
    </div>

    <!-- Active hrs/week -->
    <div class="s-field" style="border-bottom:none;">
      <span class="s-label">Active hrs / week</span>
      <div class="s-ctrl">
        <input class="s-input" type="number" id="activityVal" min="0" max="40" step="0.5" placeholder="5">
        <span class="s-unit" style="min-width:30px">hrs</span>
      </div>
    </div>

    <button class="save-btn" id="saveBtn" type="button">Save</button>

    <div class="s-divider"></div>

    <!-- WHOOP card (rendered by JS) -->
    <div id="whoopCard" class="whoop-card"></div>

  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Defaults matching topbar.js defaultWaterState ──
  function defaultState() {
    return {
      unit: 'bottle', bottleMl: 500, glassMl: 250, weightUnit: 'kg',
      profile: { weightKg: 75, age: 25, sex: 'm', activityHrsPerWeek: 5, heightCm: 175, heightUnit: 'cm' },
      caffeineMgPerDay: 200, substances: [], logs: {}
    };
  }
  function loadState() {
    try { return JSON.parse(localStorage.getItem('po_water_v1')) || defaultState(); } catch (e) { return defaultState(); }
  }

  // ── Modal open/close ──
  const gear  = document.getElementById('settingsGear');
  const bg    = document.getElementById('settingsBg');
  const close = document.getElementById('settingsClose');

  gear.addEventListener('click', openSettings);
  close.addEventListener('click', closeSettings);
  bg.addEventListener('click', function (e) { if (e.target === bg) closeSettings(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && bg.classList.contains('show')) closeSettings();
  });

  function openSettings() {
    prefillForm();
    renderWhoopCard();
    autoSyncWhoop();
    bg.classList.add('show');
  }
  function closeSettings() {
    bg.classList.remove('show');
  }

  // ── Pre-fill form ──
  function prefillForm() {
    var s = loadState();
    var p = s.profile || {};

    // Weight
    var wUnit = s.weightUnit || 'kg';
    setSegActive('weightUnitSeg', wUnit);
    var wKg = p.weightKg || 75;
    document.getElementById('weightVal').value =
      wUnit === 'lb' ? Math.round(wKg * 2.20462) : Math.round(wKg * 10) / 10;

    // Height
    var hUnit = p.heightUnit || 'cm';
    var hCm   = p.heightCm || 175;
    setSegActive('heightUnitSeg', hUnit);
    if (hUnit === 'cm') {
      showEl('heightCmWrap', true); showEl('heightFtInWrap', false);
      document.getElementById('heightCm').value = Math.round(hCm);
    } else {
      showEl('heightCmWrap', false); showEl('heightFtInWrap', true);
      var totalIn = hCm / 2.54;
      document.getElementById('heightFt').value = Math.floor(totalIn / 12);
      document.getElementById('heightIn').value = Math.round(totalIn % 12);
    }

    // Age
    document.getElementById('ageVal').value = p.age || '';

    // Sex
    setSegActive('sexSeg', p.sex || 'm');

    // Activity
    document.getElementById('activityVal').value = p.activityHrsPerWeek != null ? p.activityHrsPerWeek : '';
  }

  // ── Seg helpers ──
  function setSegActive(segId, val) {
    document.querySelectorAll('#' + segId + ' .seg-opt').forEach(function (b) {
      b.classList.toggle('active', b.dataset.val === val);
    });
  }
  function activeVal(segId) {
    var el = document.querySelector('#' + segId + ' .seg-opt.active');
    return el ? el.dataset.val : null;
  }
  function showEl(id, show) {
    var el = document.getElementById(id);
    if (!el) return;
    if (show) el.classList.remove('s-hidden'); else el.classList.add('s-hidden');
  }

  // ── Seg click handlers with in-place conversion ──
  document.getElementById('heightUnitSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('.seg-opt');
    if (!btn) return;
    var prev = activeVal('heightUnitSeg');
    var next = btn.dataset.val;
    if (prev === next) return;

    if (next === 'ftin') {
      var cm = parseFloat(document.getElementById('heightCm').value) || 175;
      var totalIn = cm / 2.54;
      document.getElementById('heightFt').value = Math.floor(totalIn / 12);
      document.getElementById('heightIn').value = Math.round(totalIn % 12);
      showEl('heightCmWrap', false); showEl('heightFtInWrap', true);
    } else {
      var ft = parseFloat(document.getElementById('heightFt').value) || 5;
      var inches = parseFloat(document.getElementById('heightIn').value) || 9;
      document.getElementById('heightCm').value = Math.round((ft * 12 + inches) * 2.54);
      showEl('heightCmWrap', true); showEl('heightFtInWrap', false);
    }
    setSegActive('heightUnitSeg', next);
  });

  document.getElementById('weightUnitSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('.seg-opt');
    if (!btn) return;
    var prev = activeVal('weightUnitSeg');
    var next = btn.dataset.val;
    if (prev === next) return;

    var cur = parseFloat(document.getElementById('weightVal').value);
    if (!isNaN(cur)) {
      document.getElementById('weightVal').value =
        next === 'lb' ? Math.round(cur * 2.20462) : Math.round((cur / 2.20462) * 10) / 10;
    }
    setSegActive('weightUnitSeg', next);
  });

  document.getElementById('sexSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('.seg-opt');
    if (btn) setSegActive('sexSeg', btn.dataset.val);
  });

  // ── Save ──
  document.getElementById('saveBtn').addEventListener('click', saveSettings);

  function saveSettings() {
    var s = loadState();
    var p = s.profile || {};

    // Weight
    var wUnit = activeVal('weightUnitSeg') || 'kg';
    var wVal  = parseFloat(document.getElementById('weightVal').value);
    if (!isNaN(wVal)) {
      p.weightKg = wUnit === 'lb' ? wVal / 2.20462 : wVal;
      s.weightUnit = wUnit;
    }

    // Height
    var hUnit = activeVal('heightUnitSeg') || 'cm';
    p.heightUnit = hUnit;
    if (hUnit === 'cm') {
      var hCm = parseFloat(document.getElementById('heightCm').value);
      if (!isNaN(hCm)) p.heightCm = hCm;
    } else {
      var ft   = parseFloat(document.getElementById('heightFt').value) || 0;
      var ins  = parseFloat(document.getElementById('heightIn').value) || 0;
      p.heightCm = (ft * 12 + ins) * 2.54;
    }

    // Age
    var age = parseInt(document.getElementById('ageVal').value, 10);
    if (!isNaN(age)) p.age = age;

    // Sex
    p.sex = activeVal('sexSeg') || 'm';

    // Activity
    var act = parseFloat(document.getElementById('activityVal').value);
    if (!isNaN(act)) p.activityHrsPerWeek = act;

    s.profile = p;
    try { localStorage.setItem('po_water_v1', JSON.stringify(s)); } catch (e) {}

    var btn = document.getElementById('saveBtn');
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
    setTimeout(function () {
      btn.textContent = 'Save';
      btn.classList.remove('saved');
    }, 1800);
  }

  // ── WHOOP card ──
  function getWhoopTokens() {
    try { return JSON.parse(localStorage.getItem('whoop_tokens_v1')); } catch (e) { return null; }
  }
  function getWhoopStats() {
    try { return JSON.parse(localStorage.getItem('whoop_stats_v1')); } catch (e) { return null; }
  }
  function getLastSyncText() {
    var ts = localStorage.getItem('whoop_last_sync');
    if (!ts) return 'Never synced';
    var mins = Math.round((Date.now() - new Date(ts).getTime()) / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return mins + ' min ago';
    var hrs = Math.round(mins / 60);
    return hrs + ' hr' + (hrs > 1 ? 's' : '') + ' ago';
  }

  function renderWhoopCard() {
    var card   = document.getElementById('whoopCard');
    var tokens = getWhoopTokens();

    if (!tokens) {
      card.innerHTML =
        '<div class="whoop-header">' +
          '<div class="whoop-name-row">' +
            '<span class="whoop-dot grey"></span>' +
            '<span class="whoop-name">Whoop</span>' +
            '<span class="whoop-status-txt">Not connected</span>' +
          '</div>' +
        '</div>' +
        '<a href="health.html" class="whoop-connect-link">Connect on Health page</a>';
      return;
    }

    var stats   = getWhoopStats();
    var recovery = stats && stats.recovery != null ? Math.round(stats.recovery) + '%' : '—';
    var sleep    = stats && stats.sleep    != null ? Math.round(stats.sleep)    + '%' : '—';
    var restHR   = stats && stats.restHR   != null ? stats.restHR + ' bpm'          : '—';

    card.innerHTML =
      '<div class="whoop-header">' +
        '<div class="whoop-name-row">' +
          '<span class="whoop-dot green"></span>' +
          '<span class="whoop-name">Whoop</span>' +
          '<span class="whoop-status-txt green">Connected</span>' +
        '</div>' +
        '<div class="whoop-sync-time" id="whoopSyncTime">Last synced ' + getLastSyncText() + '</div>' +
      '</div>' +
      '<div class="whoop-stats">' +
        '<div class="whoop-stat"><span class="whoop-stat-val">' + recovery + '</span><span class="whoop-stat-label">Recovery</span></div>' +
        '<div class="whoop-stat"><span class="whoop-stat-val">' + sleep    + '</span><span class="whoop-stat-label">Sleep</span></div>' +
        '<div class="whoop-stat"><span class="whoop-stat-val">' + restHR   + '</span><span class="whoop-stat-label">Rest HR</span></div>' +
      '</div>' +
      '<button class="whoop-sync-btn" id="whoopSyncBtn" type="button">Sync now</button>';

    document.getElementById('whoopSyncBtn').addEventListener('click', syncWhoop);
  }

  async function syncWhoop() {
    var btn = document.getElementById('whoopSyncBtn');
    if (btn) { btn.textContent = 'Syncing…'; btn.disabled = true; }
    try {
      var resp = await fetch('/api/whoop-data');
      if (resp.status === 401) {
        await fetch('/api/whoop-refresh', { method: 'POST' });
        resp = await fetch('/api/whoop-data');
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      var stats = {
        recovery : (data.recovery && data.recovery.score && data.recovery.score.recovery_score             != null) ? data.recovery.score.recovery_score             : null,
        sleep    : (data.sleep    && data.sleep.score    && data.sleep.score.sleep_performance_percentage  != null) ? data.sleep.score.sleep_performance_percentage  : null,
        restHR   : (data.recovery && data.recovery.score && data.recovery.score.resting_heart_rate         != null) ? data.recovery.score.resting_heart_rate         : null
      };
      localStorage.setItem('whoop_stats_v1', JSON.stringify(stats));
      localStorage.setItem('whoop_last_sync', new Date().toISOString());
      renderWhoopCard();
    } catch (e) {
      if (btn) { btn.textContent = 'Sync failed'; btn.disabled = false; }
      setTimeout(function () {
        var b = document.getElementById('whoopSyncBtn');
        if (b) { b.textContent = 'Sync now'; b.disabled = false; }
      }, 2500);
    }
  }

  function autoSyncWhoop() {
    if (getWhoopTokens()) syncWhoop();
  }
})();
</script>
</body>
</html>
